<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gamma Edge | Dashboard</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 40px; background-color: #f4f7f6; color: #333; }
    .container { max-width: 500px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin: auto; }
    h1 { font-size: 24px; margin-bottom: 20px; color: #2c3e50; text-align: center; }
    
    .search-box { display: flex; gap: 10px; margin-bottom: 25px; }
    input { flex-grow: 1; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; }
    input:focus { border-color: #3498db; }
    button { padding: 10px 20px; background: #3498db; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    button:hover { background: #2980b9; }

    .card { border-top: 4px solid #3498db; padding-top: 20px; display: none; }
    .row { display: flex; justify-content: space-between; margin-bottom: 12px; border-bottom: 1px solid #eee; padding-bottom: 8px; }
    .label { font-weight: 600; color: #7f8c8d; }
    .value { font-weight: bold; font-family: 'Courier New', Courier, monospace; font-size: 18px; }
    
    .outlook-badge { 
      display: inline-block; padding: 6px 12px; border-radius: 20px; 
      color: white; font-size: 14px; font-weight: bold; margin-top: 10px; text-align: center; width: 100%;
    }
    .warning { color: #e74c3c; text-align: center; margin-top: 10px; font-weight: bold; }
    .footer { font-size: 12px; color: #95a5a6; margin-top: 20px; text-align: center; }
  </style>
</head>
<body>

  <div class="container">
    <h1>Gamma Edge Lookup</h1>

    <form id="lookupForm" class="search-box">
      <input type="text" id="tickerInput" placeholder="Enter Ticker (e.g. SPY, NVDA)" autocomplete="off" />
      <button type="submit">Analyze</button>
    </form>

    <div id="resultCard" class="card">
      <div id="outlookBadge" class="outlook-badge">STABLE</div>
      <div style="margin-top: 20px;">
        <div class="row"><span class="label">Spot Price</span> <span class="value" id="res-spot">--</span></div>
        <div class="row"><span class="label">Call Wall (Resistance)</span> <span class="value" id="res-call" style="color: #e74c3c;">--</span></div>
        <div class="row"><span class="label">Put Wall (Support)</span> <span class="value" id="res-put" style="color: #27ae60;">--</span></div>
        <div class="row"><span class="label">Gamma Flip Pivot</span> <span class="value" id="res-flip" style="color: #f39c12;">--</span></div>
        <div class="row"><span class="label">Net GEX ($Bn)</span> <span class="value" id="res-gex">--</span></div>
      </div>
      <div class="footer" id="res-update">Data updated: --</div>
    </div>

    <div class="warning" id="errorMsg"></div>
  </div>

  <script src="walls.js"></script>
  <script>
    const form = document.getElementById("lookupForm");
    const resultCard = document.getElementById("resultCard");
    const errorMsg = document.getElementById("errorMsg");

    function lookupTicker() {
      const ticker = document.getElementById("tickerInput").value.toUpperCase();
      
      if (!window.WALLS) {
        errorMsg.innerText = "Error: walls.js not loaded.";
        return;
      }

      const data = window.WALLS[ticker];
      
      if (!data) {
        resultCard.style.display = "none";
        errorMsg.innerText = `No data found for ${ticker}`;
      } else {
        errorMsg.innerText = "";
        resultCard.style.display = "block";
        
        // Update Values
        document.getElementById("res-spot").innerText = data.spot;
        document.getElementById("res-call").innerText = data.callWall;
        document.getElementById("res-put").innerText = data.putWall;
        document.getElementById("res-flip").innerText = data.gammaFlip;
        document.getElementById("res-gex").innerText = data.netGEX;
        document.getElementById("res-update").innerText = "As of: " + data.updated;

        // Update Badge
        const badge = document.getElementById("outlookBadge");
        badge.innerText = data.outlook;
        badge.style.backgroundColor = data.outlookColor;
      }
      
      document.getElementById("tickerInput").value = "";
    }

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      lookupTicker();
    });
  </script>
</body>
</html>
