name: Weekly RRG Dashboard Update

on:
  push:
    branches:
      - main
    paths:
      - 'rrg/rrg.py' # Runs on push if you modify the python script itself
  schedule:
    # Runs at 20:00 UTC (1:00 PM PDT) Monday through Friday
    - cron: '0 20 * * 1-5'
  workflow_dispatch:  # allows manual trigger

jobs:
  build-and-update-rrg:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3
      with:
        persist-credentials: false
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      # Added plotly for the graph generation
      run: |
        python -m pip install --upgrade pip
        pip install yfinance numpy scipy pandas plotly

    - name: Run rrg.py
      run: |
        python rrg/rrg.py

    - name: Commit and push updated rrg_dashboard.html
      env:
        PAT: ${{ secrets.PINESCRIPT_LIBS_TOKEN }}
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add rrg/rrg_dashboard.html
        git diff --cached --quiet || git commit -m "Update rrg_dashboard.html [skip ci]"
        git push https://x-access-token:${PAT}@github.com/paulcwarren/pinescript-libs.git HEAD:main
