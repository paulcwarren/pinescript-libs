<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friday Portfolio Rebalancer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .buy-action { color: #16a34a; background-color: #dcfce7; border-color: #bbf7d0; }
        .sell-action { color: #dc2626; background-color: #fee2e2; border-color: #fecaca; }
        .hold-action { color: #4b5563; background-color: #f3f4f6; border-color: #e5e7eb; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8">

    <div class="max-w-2xl mx-auto space-y-6">
        
        <!-- Header -->
        <div class="text-center">
            <h1 class="text-3xl font-bold text-gray-900">Friday Portfolio Rebalancer</h1>
            <p class="text-gray-500 mt-2">Dual-Asset Regime Calculator (QQQ + Hedge)</p>
        </div>

        <!-- STEP 1: Python Signals -->
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
            <h2 class="text-lg font-bold text-gray-800 mb-4 flex items-center">
                <span class="bg-blue-600 text-white w-6 h-6 rounded-full flex items-center justify-center text-sm mr-2">1</span>
                System Signals (From Python)
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Current Regime</label>
                    <select id="sys-regime" class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                        <option value="4">Regime 4 (1.35x QQQ)</option>
                        <option value="3">Regime 3 (1.15x QQQ)</option>
                        <option value="2">Regime 2 (1.00x QQQ)</option>
                        <option value="1">Regime 1 (0.60x QQQ / 0.40x Hedge)</option>
                        <option value="0">Regime 0 (1.00x Hedge)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">QQQ Price ($)</label>
                    <input type="number" id="sys-qqq-price" step="0.01" placeholder="e.g. 450.00" class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Hedge Price ($)</label>
                    <input type="number" id="sys-hedge-price" step="0.01" placeholder="e.g. 30.00" class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
            </div>
        </div>

        <!-- STEP 2: Portfolio -->
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
            <div class="flex justify-between items-center mb-4 border-b border-gray-100 pb-3">
                <h2 class="text-lg font-bold text-gray-800 flex items-center">
                    <span class="bg-blue-600 text-white w-6 h-6 rounded-full flex items-center justify-center text-sm mr-2">2</span>
                    My Fidelity Account
                </h2>
                <div class="text-right text-sm text-gray-500">
                    Total Value: <span id="user-val" class="font-bold text-gray-800">$0.00</span>
                </div>
            </div>
            
            <!-- Inputs -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">Current QQQ Shares</label>
                    <input type="number" id="user-qqq-shares" placeholder="0" class="w-full p-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">Current Hedge Shares</label>
                    <input type="number" id="user-hedge-shares" placeholder="0" class="w-full p-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">Available Cash ($)</label>
                    <input type="number" id="user-cash" placeholder="0.00" class="w-full p-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 outline-none">
                </div>
            </div>
            
            <!-- Outputs -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- QQQ Instruction -->
                <div id="user-qqq-box" class="p-4 rounded-lg border flex items-center justify-between transition-colors duration-200 bg-white">
                    <div>
                        <p class="text-xs font-bold uppercase tracking-wider text-gray-500 mb-1">QQQ Action</p>
                        <p id="user-qqq-instruction" class="text-lg font-bold text-gray-400">Awaiting prices...</p>
                    </div>
                    <div class="text-right text-xs text-gray-500">
                        Target: <span id="user-qqq-tgt">0</span> shs
                    </div>
                </div>
                
                <!-- Hedge Instruction -->
                <div id="user-hedge-box" class="p-4 rounded-lg border flex items-center justify-between transition-colors duration-200 bg-white">
                    <div>
                        <p class="text-xs font-bold uppercase tracking-wider text-gray-500 mb-1">Hedge Action</p>
                        <p id="user-hedge-instruction" class="text-lg font-bold text-gray-400">Awaiting prices...</p>
                    </div>
                    <div class="text-right text-xs text-gray-500">
                        Target: <span id="user-hedge-tgt">0</span> shs
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        // Allocation Mapping (from your Python script's 'Moderate' profile)
        const regimeMap = {
            "4": { qqq: 1.35, hedge: 0.00 },
            "3": { qqq: 1.15, hedge: 0.00 },
            "2": { qqq: 1.00, hedge: 0.00 },
            "1": { qqq: 0.60, hedge: 0.40 },
            "0": { qqq: 0.00, hedge: 1.00 }
        };

        // Initialize the UI
        function init() {
            // Attach event listeners to all input fields
            const inputIds = [
                'sys-regime', 'sys-qqq-price', 'sys-hedge-price',
                'user-qqq-shares', 'user-hedge-shares', 'user-cash'
            ];
            
            inputIds.forEach(id => {
                document.getElementById(id).addEventListener('input', calculateTrades);
            });

            // --- NEW: Parse URL Query Strings ---
            const urlParams = new URLSearchParams(window.location.search);
            const urlRegime = urlParams.get('regime');
            const urlQqq = urlParams.get('qqq');
            const urlHedge = urlParams.get('hedge');

            let autoFilled = false;

            // Apply values if they exist in the URL
            if (urlRegime && regimeMap[urlRegime]) {
                document.getElementById('sys-regime').value = urlRegime;
                autoFilled = true;
            }
            if (urlQqq) {
                document.getElementById('sys-qqq-price').value = urlQqq;
                autoFilled = true;
            }
            if (urlHedge) {
                document.getElementById('sys-hedge-price').value = urlHedge;
                autoFilled = true;
            }

            // Trigger an initial calculation if we pre-filled data
            if (autoFilled) {
                calculateTrades();
            }
        }

        // Action Formatter
        function formatAction(action, boxElement, textElement) {
            boxElement.className = 'p-4 rounded-lg border flex items-center justify-between transition-colors duration-200'; // reset
            if (action > 0) {
                boxElement.classList.add('buy-action');
                textElement.innerText = `BUY ${action}`;
                textElement.className = 'text-xl font-black text-green-700';
            } else if (action < 0) {
                boxElement.classList.add('sell-action');
                textElement.innerText = `SELL ${Math.abs(action)}`;
                textElement.className = 'text-xl font-black text-red-700';
            } else {
                boxElement.classList.add('hold-action');
                textElement.innerText = `HOLD`;
                textElement.className = 'text-xl font-bold text-gray-700';
            }
        }

        // The Core Math Engine
        function calculateTrades() {
            const regime = document.getElementById('sys-regime').value;
            const qqqPrice = parseFloat(document.getElementById('sys-qqq-price').value);
            const hedgePrice = parseFloat(document.getElementById('sys-hedge-price').value);
            
            const qqqShares = parseFloat(document.getElementById('user-qqq-shares').value) || 0;
            const hedgeShares = parseFloat(document.getElementById('user-hedge-shares').value) || 0;
            const cash = parseFloat(document.getElementById('user-cash').value) || 0;
            
            const qqqLev = regimeMap[regime].qqq;
            const hedgeLev = regimeMap[regime].hedge;
            
            // If account is totally empty, stop here
            if (qqqShares === 0 && hedgeShares === 0 && cash === 0) return;

            // 1. Calculate Total Liquid Value of the Account
            let totalValue = cash;
            if (!isNaN(qqqPrice)) totalValue += (qqqShares * qqqPrice);
            if (!isNaN(hedgePrice)) totalValue += (hedgeShares * hedgePrice);

            document.getElementById('user-val').innerText = `$${totalValue.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;

            // 2. QQQ Math
            if (!isNaN(qqqPrice) && qqqPrice > 0) {
                const targetQqqShares = Math.floor((totalValue * qqqLev) / qqqPrice);
                const qqqAction = targetQqqShares - qqqShares;
                document.getElementById('user-qqq-tgt').innerText = targetQqqShares;
                formatAction(qqqAction, document.getElementById('user-qqq-box'), document.getElementById('user-qqq-instruction'));
            } else {
                 document.getElementById('user-qqq-instruction').innerText = "Enter QQQ Price...";
                 document.getElementById('user-qqq-instruction').className = "text-lg font-bold text-gray-400";
            }

            // 3. Hedge Math
            if (!isNaN(hedgePrice) && hedgePrice > 0) {
                const targetHedgeShares = Math.floor((totalValue * hedgeLev) / hedgePrice);
                const hedgeAction = targetHedgeShares - hedgeShares;
                document.getElementById('user-hedge-tgt').innerText = targetHedgeShares;
                formatAction(hedgeAction, document.getElementById('user-hedge-box'), document.getElementById('user-hedge-instruction'));
            } else {
                 document.getElementById('user-hedge-instruction').innerText = "Enter Hedge Price...";
                 document.getElementById('user-hedge-instruction').className = "text-lg font-bold text-gray-400";
            }
        }

        // Start app
        init();
    </script>
</body>
</html>
